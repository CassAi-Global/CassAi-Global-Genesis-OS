<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CASSAIGLOBAL | Sovereign Equation</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --deep-black: #050505;
            --gold-accent: #d4af37;
        }
        body {
            background-color: var(--deep-black);
            color: var(--matrix-green);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            border: 2px solid var(--matrix-green);
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        h1 {
            font-size: 1.2rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            color: var(--gold-accent);
        }
        .formula {
            font-size: 3rem;
            margin: 20px 0;
            font-weight: bold;
        }
        .legend {
            text-align: left;
            font-size: 0.9rem;
            margin-top: 30px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .osh {
            margin-top: 20px;
            font-size: 1.5rem;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CASSAIGLOBAL GENESIS KERNEL</h1>
    
    <div class="formula">
        G = (B<sub>roi</sub> &times; &xi;) / (&sigma; + &Delta;)
    </div>

    <div class="legend">
        <div><strong>G</strong> = Genesis (The Sovereign Output)</div>
        <div><strong>B<sub>roi</sub></strong> = Biological ROI (26,688 Steps)</div>
        <div><strong>&xi;</strong> = Animus (The Will of the Architect)</div>
        <div><strong>&sigma;</strong> = Static Sloth (Council Debt)</div>
        <div><strong>&Delta;</strong> = Delta (Friction/Change)</div>
    </div>

    <div class="osh">OUSH.</div>
</div>

</body>
</html>
